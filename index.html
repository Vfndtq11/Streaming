<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МотоСтрим | LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        /* Видео блок */
        .video-section {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video, iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
        }
        /* Инфо под видео */
        .info {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .viewers {
            color: #0f0;
            font-family: monospace;
        }
        /* Чат блок */
        .chat-section {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            position: sticky;
            top: 20px;
        }
        .chat-header {
            background: #0a0a0a;
            padding: 15px;
            color: #0f0;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .chat-input {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 20px;
            color: white;
            outline: none;
        }
        .chat-input input:focus {
            border-color: #0f0;
        }
        .chat-input button {
            padding: 10px 20px;
            background: #0f0;
            color: black;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .message {
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 12px;
            word-break: break-word;
        }
        .message.streamer {
            background: #1a3a1a;
            border-left: 3px solid #0f0;
        }
        .message.viewer {
            background: #2a2a2a;
        }
        .message-name {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            color: #0f0;
        }
        .message-text {
            font-size: 14px;
            color: white;
        }
        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
        /* Адаптив под телефон */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .chat-section {
                height: 400px;
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ЛЕВАЯ ЧАСТЬ: ВИДЕО -->
        <div>
            <div class="video-section">
                <!-- ВАРИАНТ А: WebRTC (малая задержка) -->
                <iframe src="http://IP_ТВОЕГО_КОМПА:8889/mystream" allow="autoplay; encrypted-media"></iframe>
                
                <!-- ВАРИАНТ Б: HLS (если WebRTC не работает, раскомментируй этот и закомментируй iframe выше)
                <video id="videoPlayer" controls autoplay muted></video>
                -->
            </div>
            <div class="info">
                <span>🏍️ МотоСтрим LIVE</span>
                <span class="viewers" id="viewerCount">👥 Зрителей: --</span>
            </div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ: ЧАТ -->
        <div class="chat-section">
            <div class="chat-header">💬 ЧАТ</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message system" style="text-align: center; color: #ff0;">
                    📡 Чат подключен. Напиши что-нибудь!
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Написать в чат..." maxlength="200">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        // ВСТАВЬ СЮДА СВОИ ДАННЫЕ
        const STREAMER_NAME = "🎥 СТРИМЕР";  // Как будешь отображаться в чате
        const STREAMER_PASSWORD = "moto2024"; // Пароль для входа в панель
        
        // ========== ЧАТ ==========
        let viewerName = localStorage.getItem('viewerName');
        
        if (!viewerName) {
            const names = ['Гонщик', 'Райдер', 'Мот', 'Вихрь', 'Скорость', 'Ветер', 'Ночной', 'Смелый'];
            const num = Math.floor(Math.random() * 1000);
            viewerName = names[Math.floor(Math.random() * names.length)] + num;
            localStorage.setItem('viewerName', viewerName);
        }
        
        // Функция отправки сообщения
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            const msg = {
                name: viewerName,
                text: message,
                time: new Date().toLocaleTimeString(),
                isStreamer: false
            };
            
            saveMessage(msg);
            input.value = '';
        }
        
        // Сохранение сообщения (в localStorage)
        function saveMessage(msg) {
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            messages.push(msg);
            if (messages.length > 100) messages.shift();
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            displayMessages();
        }
        
        // Отображение сообщений
        function displayMessages() {
            const container = document.getElementById('chatMessages');
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            
            container.innerHTML = '';
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.isStreamer ? 'streamer' : 'viewer'}`;
                msgDiv.innerHTML = `
                    <div class="message-name">${msg.name}</div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time}</div>
                `;
                container.appendChild(msgDiv);
            });
            container.scrollTop = container.scrollHeight;
        }
        
        // Защита от XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Обновление чата каждые 0.5 секунды
        setInterval(displayMessages, 500);
        
        // Enter для отправки
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // ========== СЧЁТЧИК ЗРИТЕЛЕЙ (опционально) ==========
        // Счётчик работает через WebSocket к MediaMTX
        // Пока заглушка, потом можно добавить реальный счётчик
        
        // ========== ВИДЕО (HLS вариант, если WebRTC не работает) ==========
        const videoPlayer = document.getElementById('videoPlayer');
        if (videoPlayer && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource('http://IP_ТВОЕГО_КОМПА:8888/mystream/index.m3u8');
            hls.attachMedia(videoPlayer);
        }
        
        // Приветствие
        setTimeout(() => {
            saveMessage({
                name: '📢 СИСТЕМА',
                text: `👋 ${viewerName} присоединился к стриму!`,
                time: new Date().toLocaleTimeString(),
                isStreamer: false
            });
        }, 1000);
    </script>
</body>
</html>
