<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МотоСтрим | LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .video-box {
            flex: 2;
            min-width: 300px;
        }
        .chat-box {
            flex: 1;
            min-width: 300px;
            background: #1a1a1a;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            height: 80vh;
            position: sticky;
            top: 20px;
        }
        .video-wrapper {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        .placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10;
        }
        .placeholder-text {
            font-size: 5rem;
            font-weight: bold;
            color: #0f0;
            text-align: center;
            font-family: monospace;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #0f0;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px #0f0; }
            50% { opacity: 0.7; text-shadow: 0 0 5px #0f0; }
        }
        @media (max-width: 768px) {
            .placeholder-text {
                font-size: 2rem;
                letter-spacing: 5px;
            }
        }
        .chat-header {
            padding: 15px;
            background: #0a0a0a;
            border-radius: 24px 24px 0 0;
            color: #0f0;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nickname-badge {
            font-size: 12px;
            background: #0a0a0a;
            padding: 5px 10px;
            border-radius: 20px;
            color: #0f0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-input {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 20px;
            color: white;
            outline: none;
        }
        .chat-input input:disabled {
            opacity: 0.5;
        }
        .chat-input button {
            padding: 10px 20px;
            background: #0f0;
            color: black;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            padding: 8px 12px;
            border-radius: 12px;
            word-break: break-word;
        }
        .message.viewer {
            background: #2a2a2a;
        }
        .message.streamer {
            background: #1a3a1a;
            border-left: 3px solid #0f0;
        }
        .message-name {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            color: #0f0;
        }
        .message-text {
            font-size: 14px;
            color: white;
        }
        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
        .system-msg {
            text-align: center;
            color: #ff0;
            font-style: italic;
            font-size: 12px;
        }
        .nickname-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .nickname-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .nickname-box h2 {
            color: #0f0;
            margin-bottom: 20px;
        }
        .nickname-box input {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        .nickname-box button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #0f0;
            color: black;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .error-msg {
            color: #f00;
            margin-top: 10px;
            font-size: 12px;
        }
        @media (max-width: 768px) {
            .chat-box {
                height: 400px;
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ВИДЕО БЛОК -->
        <div class="video-box">
            <div class="video-wrapper" id="videoWrapper">
                <div class="placeholder">
                    <div class="placeholder-text">ЩАС ВЕРНУСЬ</div>
                </div>
                <!-- Видео появится здесь, если стрим идёт -->
            </div>
        </div>

        <!-- ЧАТ БЛОК -->
        <div class="chat-box">
            <div class="chat-header">
                <span>💬 ЧАТ</span>
                <span class="nickname-badge" id="nicknameBadge">👤 Без ника</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="system-msg">📡 Чтобы писать в чат — введи свой ник</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Сначала введи ник..." disabled>
                <button id="sendBtn" disabled>➤</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ДЛЯ ВВОДА НИКА -->
    <div id="nicknameModal" class="nickname-modal">
        <div class="nickname-box">
            <h2>🏍️ Введи свой ник</h2>
            <input type="text" id="nicknameInput" placeholder="Твой ник в чате" maxlength="30">
            <button onclick="setNickname()">Войти в чат</button>
            <div id="nicknameError" class="error-msg"></div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ (ПОМЕНЯЙ ТУТ СВОЙ URL) ==========
        const STREAM_URL = "http://192.168.1.103:8888/moto";  // СЮДА ВСТАВЬ СВОЙ URL
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let viewerName = null;
        let checkInterval = null;

        // ========== ПРОВЕРКА СТРИМА ==========
        function checkStream() {
            const videoWrapper = document.getElementById('videoWrapper');
            
            // Пробуем загрузить картинку с сервера (простой способ проверить, есть ли стрим)
            fetch(STREAM_URL, { method: 'HEAD', mode: 'no-cors' })
                .then(() => {
                    // Если стрим есть — показываем видео
                    if (videoWrapper.querySelector('.placeholder')) {
                        videoWrapper.innerHTML = `<iframe src="${STREAM_URL}" allow="autoplay; encrypted-media" style="width:100%; height:100%; border:none;"></iframe>`;
                    }
                })
                .catch(() => {
                    // Если стрима нет — показываем надпись
                    if (!videoWrapper.querySelector('.placeholder')) {
                        videoWrapper.innerHTML = `
                            <div class="placeholder">
                                <div class="placeholder-text">ЩАС ВЕРНУСЬ</div>
                            </div>
                        `;
                    }
                });
        }
        
        // Проверяем каждые 5 секунд
        checkStream();
        checkInterval = setInterval(checkStream, 5000);

        // ========== МОДАЛКА С НИКОМ ==========
        function setNickname() {
            const input = document.getElementById('nicknameInput');
            const nickname = input.value.trim();
            
            if (!nickname) {
                document.getElementById('nicknameError').innerText = '❌ Введи ник!';
                return;
            }
            
            if (nickname.length > 30) {
                document.getElementById('nicknameError').innerText = '❌ Ник не длиннее 30 символов';
                return;
            }
            
            const badWords = ['admin', 'moder', 'moderator', 'system', 'striker', 'стример'];
            if (badWords.includes(nickname.toLowerCase())) {
                document.getElementById('nicknameError').innerText = '❌ Этот ник занят';
                return;
            }
            
            viewerName = nickname;
            localStorage.setItem('viewerName', viewerName);
            
            document.getElementById('nicknameModal').style.display = 'none';
            document.getElementById('nicknameBadge').innerHTML = `👤 ${escapeHtml(viewerName)}`;
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            saveMessage({
                name: '📢 СИСТЕМА',
                text: `👋 ${escapeHtml(viewerName)} присоединился к чату`,
                time: new Date().toLocaleTimeString(),
                isStreamer: false
            });
        }
        
        const savedName = localStorage.getItem('viewerName');
        if (savedName) {
            viewerName = savedName;
            document.getElementById('nicknameModal').style.display = 'none';
            document.getElementById('nicknameBadge').innerHTML = `👤 ${escapeHtml(viewerName)}`;
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        }

        // ========== ЧАТ ==========
        function sendMessage() {
            if (!viewerName) {
                alert('Сначала введи ник!');
                return;
            }
            
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            const message = {
                name: viewerName,
                text: text,
                time: new Date().toLocaleTimeString(),
                isStreamer: false
            };
            
            saveMessage(message);
            input.value = '';
        }
        
        window.sendStreamerMessage = function(text) {
            const message = {
                name: '🎥 СТРИМЕР',
                text: text,
                time: new Date().toLocaleTimeString(),
                isStreamer: true
            };
            saveMessage(message);
        };
        
        function saveMessage(msg) {
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            messages.push(msg);
            if (messages.length > 200) messages.shift();
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            displayMessages();
        }
        
        function displayMessages() {
            const container = document.getElementById('chatMessages');
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="system-msg">💬 Напиши первое сообщение!</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.isStreamer ? 'streamer' : 'viewer'}">
                    <div class="message-name">${escapeHtml(msg.name)}</div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        setInterval(displayMessages, 500);
        
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
