<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель стримера</title>
    <style>
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }
        input, button {
            padding: 12px;
            margin: 10px;
            font-size: 16px;
            border-radius: 8px;
        }
        input {
            background: #1a1a1a;
            color: #0f0;
            border: 1px solid #0f0;
            width: 250px;
        }
        button {
            background: #0f0;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .panel {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .link-box {
            margin-top: 20px;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>🎥 ПАНЕЛЬ СТРИМЕРА</h1>
        
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        
        <div id="adminPanel" style="display: none; margin-top: 30px;">
            <h3>Настройки стрима</h3>
            
            <p><strong>IP твоего компьютера:</strong></p>
            <input type="text" id="serverIp" placeholder="192.168.1.100">
            <p><strong>Stream Key (из PRISM):</strong></p>
            <input type="text" id="streamKey" placeholder="moto">
            
            <button onclick="generateLinks()">💾 Сгенерировать ссылки</button>
            
            <div id="links" style="display: none;">
                <div class="link-box">
                    <h3>🔗 Ссылка для зрителей:</h3>
                    <code id="viewerLink"></code>
                    <br><br>
                    <button onclick="copyLink('viewerLink')">📋 Копировать</button>
                </div>
                <div class="link-box">
                    <h3>📱 Ссылка на твою панель:</h3>
                    <code id="streamerLink"></code>
                    <br><br>
                    <button onclick="copyLink('streamerLink')">📋 Копировать</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PASS = "moto2024";
        
        function login() {
            if (document.getElementById('pass').value === PASS) {
                document.getElementById('adminPanel').style.display = 'block';
                loadSaved();
            } else {
                alert('Неверный пароль');
            }
        }
        
        function loadSaved() {
            const savedIp = localStorage.getItem('serverIp');
            const savedKey = localStorage.getItem('streamKey');
            if (savedIp) document.getElementById('serverIp').value = savedIp;
            if (savedKey) document.getElementById('streamKey').value = savedKey;
            if (savedIp && savedKey) generateLinks();
        }
        
        function generateLinks() {
            const ip = document.getElementById('serverIp').value.trim();
            const key = document.getElementById('streamKey').value.trim();
            
            if (!ip || !key) {
                alert('Введи IP и Stream Key!');
                return;
            }
            
            localStorage.setItem('serverIp', ip);
            localStorage.setItem('streamKey', key);
            
            const baseUrl = window.location.origin;
            const viewerUrl = `${baseUrl}/index.html?stream=${ip}&key=${key}`;
            const streamerUrl = `${baseUrl}/streamer.html`;
            
            document.getElementById('viewerLink').innerHTML = viewerUrl;
            document.getElementById('streamerLink').innerHTML = streamerUrl;
            document.getElementById('links').style.display = 'block';
        }
        
        function copyLink(elementId) {
            const text = document.getElementById(elementId).innerHTML;
            navigator.clipboard.writeText(text);
            alert('Ссылка скопирована!');
        }
    </script>
</body>
</html>
