<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МотоСтрим — Смотреть эфир</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .video-container {
            flex: 3;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .chat-container {
            flex: 1;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            min-width: 300px;
        }
        #stream {
            max-width: 100%;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .info-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #0f0;
            font-size: 14px;
            z-index: 10;
        }
        .chat-header {
            padding: 15px;
            background: #0a0a0a;
            border-bottom: 1px solid #333;
            color: #0f0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            gap: 10px;
            display: flex;
            flex-direction: column;
        }
        .message {
            padding: 8px 12px;
            border-radius: 10px;
            word-break: break-word;
        }
        .message.streamer {
            background: #0f0220;
            border-left: 3px solid #0f0;
            color: #0f0;
        }
        .message.viewer {
            background: #2a2a3e;
            color: white;
        }
        .message.system {
            background: #333;
            color: #ff0;
            font-style: italic;
            text-align: center;
            font-size: 12px;
        }
        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            background: black;
            color: white;
            border: 1px solid #0f0;
            border-radius: 20px;
            outline: none;
        }
        .chat-input-area button {
            padding: 10px 20px;
            background: #0f0;
            color: black;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .offline-message {
            text-align: center;
            color: red;
            padding: 20px;
        }
        .viewer-name {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .chat-container {
                height: 300px;
                min-width: auto;
            }
            .video-container {
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="video-container">
            <img id="stream" src="" alt="Стрим">
            <div class="info-bar" id="statusBar">
                🔄 Подключение...
            </div>
        </div>
        <div class="chat-container">
            <div class="chat-header">
                💬 ЧАТ • <span id="onlineCount">0</span> зрителей
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message system">📡 Подключаемся к чату...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Написать в чат...">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        let streamUrl = null;
        let intervalId = null;
        let viewerId = null;
        let viewerName = null;

        // Генерируем имя зрителя
        function generateViewerName() {
            const adjectives = ['Быстрый', 'Смелый', 'Дикий', 'Ночной', 'Солнечный', 'Грозный'];
            const nouns = ['Мот', 'Райдер', 'Гонщик', 'Ездок', 'Ветер', 'Шум'];
            const randomNum = Math.floor(Math.random() * 1000);
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            return `${adj}${noun}${randomNum}`;
        }

        // Получаем URL стрима
        function getStreamUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            let url = urlParams.get('stream');
            if (url) {
                return decodeURIComponent(url);
            }
            // Пробуем из localStorage (если зритель уже был)
            return localStorage.getItem('lastStreamUrl');
        }

        // Регистрация зрителя
        function registerViewer() {
            viewerId = Date.now() + Math.random();
            viewerName = localStorage.getItem('viewerName');
            if (!viewerName) {
                viewerName = generateViewerName();
                localStorage.setItem('viewerName', viewerName);
            }
            
            // Добавляем в список активных зрителей
            let viewers = JSON.parse(localStorage.getItem('activeViewers') || '[]');
            if (!viewers.includes(viewerId.toString())) {
                viewers.push(viewerId.toString());
                localStorage.setItem('activeViewers', JSON.stringify(viewers));
            }
            
            updateOnlineCount();
            addSystemMessage(`👤 ${viewerName} присоединился к стриму`);
        }

        function updateOnlineCount() {
            const viewers = JSON.parse(localStorage.getItem('activeViewers') || '[]');
            document.getElementById('onlineCount').textContent = viewers.length;
        }

        // Чат
        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message system';
            msgDiv.innerHTML = `📢 ${text}`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            const chatMessage = {
                sender: 'viewer',
                name: viewerName,
                message: message,
                time: new Date().toLocaleTimeString()
            };
            
            saveMessage(chatMessage);
            input.value = '';
        }

        function saveMessage(msg) {
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            messages.push(msg);
            if (messages.length > 100) messages.shift();
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            updateChatDisplay();
        }

        function updateChatDisplay() {
            const messagesDiv = document.getElementById('chatMessages');
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            
            messagesDiv.innerHTML = '';
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.sender === 'streamer' ? 'streamer' : 'viewer'}`;
                msgDiv.innerHTML = `<strong>${msg.name}:</strong> ${msg.message}<br><small style="font-size: 10px;">${msg.time}</small>`;
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Видео поток
        function startViewer() {
            streamUrl = getStreamUrl();
            
            if (!streamUrl) {
                document.getElementById('statusBar').innerHTML = '❌ Стрим не идёт';
                document.getElementById('statusBar').style.color = '#f00';
                document.getElementById('stream').style.display = 'none';
                addSystemMessage('⚠️ Стример ещё не начал трансляцию');
                return;
            }
            
            localStorage.setItem('lastStreamUrl', streamUrl);
            const imgElement = document.getElementById('stream');
            imgElement.style.display = 'block';
            
            function updateFrame() {
                imgElement.src = streamUrl + '?_=' + Date.now();
            }
            
            updateFrame();
            intervalId = setInterval(updateFrame, 150);
            
            imgElement.onload = () => {
                document.getElementById('statusBar').innerHTML = '🔴 LIVE • МотоСтрим';
                document.getElementById('statusBar').style.color = '#0f0';
            };
            
            imgElement.onerror = () => {
                document.getElementById('statusBar').innerHTML = '⚠️ Потеря сигнала';
                document.getElementById('statusBar').style.color = '#ff0';
            };
        }

        // Периодическое обновление чата
        setInterval(() => {
            updateChatDisplay();
            updateOnlineCount();
        }, 500);

        // Удаляем зрителя при уходе
        window.addEventListener('beforeunload', () => {
            let viewers = JSON.parse(localStorage.getItem('activeViewers') || '[]');
            viewers = viewers.filter(id => id !== viewerId.toString());
            localStorage.setItem('activeViewers', JSON.stringify(viewers));
            addSystemMessage(`👋 ${viewerName} покинул стрим`);
        });

        // Запуск
        registerViewer();
        startViewer();
        
        // Enter для отправки
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
